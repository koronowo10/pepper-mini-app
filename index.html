<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okazja Pepper</title>
    
    <script src='//libtl.com/sdk.js' data-zone='10922235' data-sdk='show_10922235'></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 90%;
        }
        .btn {
            background-color: #ff4400;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
            cursor: pointer;
        }
        h2 { color: #333; }
        p { color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>Twoja okazja jest gotowa! 🔥</h2>
    <p>Kliknij poniższy przycisk, aby przejść do Peppera.</p>
    
    <div id="target-link" class="btn">PRZEJDŹ DO OKAZJI</div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const pepperUrl = urlParams.get('url');

    document.getElementById('target-link').addEventListener('click', function() {
        if (pepperUrl) {
            window.location.href = decodeURIComponent(pepperUrl);
        } else {
            alert('Błąd linku. Spróbuj ponownie z kanału.');
        }
    });
</script>

</body>
</html>
