<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okazja Pepper</title>
    
    <script src='//libtl.com/sdk.js' data-zone='10922235' data-sdk='show_10922235'></script>

    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 80%; }
        .btn { background-color: #ff4400; color: white; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; display: inline-block; margin-top: 20px; }
        .loader { display: none; margin-top: 20px; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>Twoja okazja jest gotowa! 🔥</h2>
    <p>Kliknij przycisk, aby odblokować link do Peppera.</p>
    
    <div id="ad-button" class="btn">ODBLOKUJ OKAZJĘ 🔓</div>
    <div id="status-msg" class="loader">Inicjowanie reklamy...</div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const pepperUrl = decodeURIComponent(urlParams.get('url'));

    document.getElementById('ad-button').addEventListener('click', function() {
        if (!pepperUrl || pepperUrl === 'null') {
            alert('Błąd linku. Spróbuj ponownie z bota.');
            return;
        }

        document.getElementById('status-msg').style.display = 'block';
        document.getElementById('ad-button').style.opacity = '0.5';

        // ODPALENIE TWOJEJ REKLAMY NAGRADZANEJ
        show_10922235().then(() => {
            // Funkcja wykonana PO obejrzeniu reklamy
            window.location.href = pepperUrl;
        }).catch((e) => {
            // Jeśli reklama się nie załaduje, i tak puść użytkownika (żeby nie uciekł)
            window.location.href = pepperUrl;
        });
    });
</script>

</body>
</html>
